name: Desktop packaged E2E

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  packaged-desktop:
    name: Packaged desktop (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.14.0"

      - name: Install frozen uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.28"
          enable-cache: false

      - name: Set up exact managed Python
        run: node scripts/setup-ci-python.mjs 3.12.13

      - name: Verify frozen pnpm
        run: corepack pnpm@9.15.9 --version

      - name: Install Node dependencies (macOS)
        if: runner.os == 'macOS'
        run: corepack pnpm@9.15.9 install --frozen-lockfile

      - name: Install Node dependencies (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: corepack pnpm@9.15.9 --config.node-linker=hoisted --config.virtual-store-dir=.pnpm install --frozen-lockfile

      - name: Install hash-locked Python dependencies
        run: |
          python -m pip install --require-hashes --only-binary=:all: -r requirements-dev.lock
          python -m pip check

      - name: Create acceptance report directory
        shell: bash
        run: mkdir -p artifacts/acceptance

      - name: Verify dependency lock policies
        run: |
          node scripts/verify-dependency-policy.mjs
          python scripts/verify_python_locks.py

      - name: Lint and type-check
        run: |
          corepack pnpm@9.15.9 lint
          corepack pnpm@9.15.9 ts-check

      - name: Run unit tests with machine report
        run: node scripts/run-evidence-command.mjs --name unit --platform ${{ matrix.platform }} --artifact artifacts/acceptance/unit.json -- pnpm exec vitest run --reporter=default --reporter=json --outputFile.json=artifacts/acceptance/unit.json

      - name: Run Python tests with machine report
        run: node scripts/run-evidence-command.mjs --name python --platform ${{ matrix.platform }} --artifact artifacts/acceptance/python.xml -- python -m pytest -q --junitxml=artifacts/acceptance/python.xml

      - name: Install the frozen Playwright Chromium runtime
        run: corepack pnpm@9.15.9 exec playwright install chromium

      - name: Run browser performance and workflow tests
        env:
          CABLE_PLAYWRIGHT_PREBUILT: "1"
          PLAYWRIGHT_JSON_OUTPUT_FILE: artifacts/acceptance/browser.json
          PLAYWRIGHT_PORT: "51237"
        run: corepack pnpm@9.15.9 build && node scripts/run-evidence-command.mjs --name browser --platform ${{ matrix.platform }} --artifact artifacts/acceptance/browser.json -- pnpm exec playwright test --project=chromium --workers=1 --reporter=json

      - name: Audit production dependencies (macOS)
        if: runner.os == 'macOS'
        run: node scripts/run-evidence-command.mjs --name audit --platform mac --capture artifacts/acceptance/audit-mac.json -- corepack pnpm@11.4.0 --pm-on-fail=ignore audit --prod --audit-level high --registry=https://registry.npmjs.org --json

      - name: Audit production dependencies (Windows)
        if: runner.os == 'Windows'
        run: node scripts/run-evidence-command.mjs --name audit --platform win --capture artifacts/acceptance/audit-win.json -- corepack pnpm@11.4.0 --pm-on-fail=ignore audit --prod --audit-level high --registry=https://registry.npmjs.org --json

      - name: Build macOS package
        if: runner.os == 'macOS'
        env:
          CABLE_MAC_SIGNING_MODE: adhoc
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          CSC_FOR_PULL_REQUEST: "true"
        run: node scripts/run-evidence-command.mjs --name package --platform mac -- pnpm desktop:dist:mac

      - name: Build Windows package
        if: runner.os == 'Windows'
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: node scripts/run-evidence-command.mjs --name package --platform win -- pnpm desktop:dist:win

      - name: Verify macOS package structure and size
        if: runner.os == 'macOS'
        run: node scripts/verify-desktop-package.mjs mac && node scripts/verify-macos-trust.mjs && node scripts/check-package-size.mjs mac

      - name: Verify Windows package structure and size
        if: runner.os == 'Windows'
        run: node scripts/verify-desktop-package.mjs win && node scripts/check-package-size.mjs win

      - name: Run packaged macOS E2E
        if: runner.os == 'macOS'
        env:
          PYTHON_CMD: python
        run: node scripts/run-evidence-command.mjs --name desktop --platform mac --artifact artifacts/acceptance/desktop-mac.json -- pnpm test:e2e:mac

      - name: Run packaged Windows E2E
        if: runner.os == 'Windows'
        env:
          PYTHON_CMD: python
        run: node scripts/run-evidence-command.mjs --name desktop --platform win --artifact artifacts/acceptance/desktop-win.json -- pnpm test:e2e:win

      - name: Bind internal macOS package reports to current commit
        if: runner.os == 'macOS'
        run: node scripts/write-acceptance-evidence.mjs mac

      - name: Bind Windows reports and installer to current commit
        if: runner.os == 'Windows'
        run: node scripts/write-acceptance-evidence.mjs win

      - name: Aggregate macOS acceptance
        if: runner.os == 'macOS'
        run: corepack pnpm@9.15.9 verify:acceptance -- --platform mac --emit-ci-report artifacts/acceptance/ci-mac.json

      - name: Aggregate Windows acceptance
        if: runner.os == 'Windows'
        run: corepack pnpm@9.15.9 verify:acceptance -- --platform win --emit-ci-report artifacts/acceptance/ci-win.json

      - name: Upload Windows installer
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: Cable-Report-Generator-Windows
          path: |
            release/*.exe
            release/latest.yml
            release/*.blockmap
          if-no-files-found: error

      - name: Upload macOS acceptance evidence
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: Cable-Report-Acceptance-macOS
          path: artifacts/acceptance/ci-mac.json
          if-no-files-found: error

      - name: Upload Windows acceptance evidence
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: Cable-Report-Acceptance-Windows
          path: artifacts/acceptance/ci-win.json
          if-no-files-found: error
