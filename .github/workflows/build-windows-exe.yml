name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/build-windows-exe.yml"
      - "assets/**"
      - "electron/**"
      - "fonts/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "requirements.txt"
      - "scripts/**"
      - "src/**"
      - "public/**"
      - "next.config.mjs"
      - "tsconfig.json"

jobs:
  build-windows-exe:
    name: Build Windows desktop app
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Enable pnpm
        shell: pwsh
        run: |
          corepack enable
          corepack prepare pnpm@9.0.0 --activate

      - name: Install Node dependencies
        shell: pwsh
        run: |
          Add-Content -Path .npmrc -Value ""
          Add-Content -Path .npmrc -Value "node-linker=hoisted"
          Add-Content -Path .npmrc -Value "virtual-store-dir=.pnpm"
          pnpm install --frozen-lockfile=false

      - name: Install Python dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Build Windows EXE
        shell: pwsh
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: |
          pnpm build
          node ./scripts/build-python-workers.mjs
          pnpm exec electron-builder --win

      - name: Show build outputs
        shell: pwsh
        run: Get-ChildItem -Path release -Recurse | Select-Object FullName, Length

      - name: Verify Windows package contents
        shell: pwsh
        run: node ./scripts/verify-desktop-package.mjs win

      - name: Upload Windows EXE artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Cable-Report-Generator-Windows
          path: |
            release/*.exe
            release/*.zip
            release/*.blockmap
            release/latest*.yml
            release/win-unpacked/**
          if-no-files-found: error
