name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - ".github/workflows/build-windows-exe.yml"
      - ".npmrc"
      - "assets/**"
      - "electron/**"
      - "fonts/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "requirements.txt"
      - "requirements.lock"
      - "requirements-dev.txt"
      - "requirements-dev.lock"
      - "requirements-lock-tools.txt"
      - "scripts/**"
      - "src/**"
      - "tests/**"
      - "vendor/**"
      - "next.config.mjs"
      - "tsconfig.json"

permissions:
  contents: read

jobs:
  build-windows-exe:
    name: Build Windows desktop app
    runs-on: windows-2025

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.14.0"

      - name: Install frozen uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.28"
          enable-cache: false

      - name: Set up exact managed Python
        run: node scripts/setup-ci-python.mjs 3.12.13

      - name: Verify pnpm
        run: corepack pnpm@9.15.9 --version

      - name: Install Node dependencies
        shell: pwsh
        run: |
          Add-Content -Path .npmrc -Value ""
          Add-Content -Path .npmrc -Value "node-linker=hoisted"
          Add-Content -Path .npmrc -Value "virtual-store-dir=.pnpm"
          corepack pnpm@9.15.9 install --frozen-lockfile

      - name: Install Python dependencies
        shell: pwsh
        run: |
          python -m pip install --require-hashes --only-binary=:all: -r requirements-dev.lock
          python -m pip check

      - name: Verify dependency locks and security
        shell: pwsh
        run: |
          node scripts/verify-dependency-policy.mjs
          python scripts/verify_python_locks.py
          corepack pnpm@9.15.9 audit --audit-level high --registry=https://registry.npmjs.org

      - name: Run release quality gates
        shell: pwsh
        run: |
          corepack pnpm@9.15.9 check:fast
          corepack pnpm@9.15.9 test:python

      - name: Build Windows EXE
        shell: pwsh
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: corepack pnpm@9.15.9 desktop:dist:win

      - name: Show build outputs
        shell: pwsh
        run: Get-ChildItem -Path release -Recurse | Select-Object FullName, Length

      - name: Verify Windows package contents
        shell: pwsh
        run: |
          node ./scripts/verify-desktop-package.mjs win
          node ./scripts/check-package-size.mjs win

      - name: Upload Windows EXE artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Cable-Report-Generator-Windows
          path: |
            release/*.exe
            release/latest.yml
            release/*.blockmap
          if-no-files-found: error
