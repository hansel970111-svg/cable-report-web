name: Quality

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  quality:
    name: Lint, test, audit, and build
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - uses: actions/setup-node@v4
        with:
          node-version: "24.14.0"
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.28"
          enable-cache: false
      - run: node scripts/setup-ci-python.mjs 3.12.13
      - run: corepack pnpm@9.15.9 install --frozen-lockfile
      - run: python -m pip install --require-hashes -r requirements-dev.lock
      - run: corepack pnpm@9.15.9 lint
      - run: corepack pnpm@9.15.9 ts-check
      - run: corepack pnpm@9.15.9 test:unit
      - run: python -m pytest -q
      - run: corepack pnpm@9.15.9 audit --prod --audit-level high --registry=https://registry.npmjs.org
      - run: corepack pnpm@9.15.9 build
      - run: node scripts/verify-build-inputs.mjs
