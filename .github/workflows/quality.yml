name: Quality

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  quality:
    name: Lint, test, audit, and build
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24.14.0"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12.13"
      - run: corepack prepare pnpm@9.15.9 --activate
      - run: pnpm install --frozen-lockfile
      - run: python -m pip install --require-hashes -r requirements-dev.lock
      - run: pnpm lint
      - run: pnpm ts-check
      - run: pnpm test:unit
      - run: python -m pytest -q
      - run: pnpm audit --prod --audit-level high --registry=https://registry.npmjs.org
      - run: pnpm build
      - run: node scripts/verify-build-inputs.mjs
